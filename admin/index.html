<!DOCTYPE html>
<html lang="ckb" dir="rtl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>داشبۆردی ئەدمین</title>
    <link rel="stylesheet" href="../css/style.css" />
  </head>
  <body>
    <div class="wrap" style="max-width: 720px">
      <section id="login-view">
        <h1>چوونەژوورەوەی ئەدمین</h1>
        <p class="sub">تەنها بۆ خاوەنی هەژمار (Supabase Auth)</p>
        <form id="login-form" class="login-form card">
          <label for="email">ئیمەیڵ</label>
          <input id="email" name="email" type="email" required autocomplete="username" />
          <label for="password">وشەی نهێنی</label>
          <input id="password" name="password" type="password" required autocomplete="current-password" />
          <button type="submit" class="btn-primary">چوونەژوورەوە</button>
          <p id="login-error" class="status error"></p>
        </form>
      </section>

      <section id="dash-view" class="hidden">
        <div class="admin-header">
          <h1>داشبۆرد</h1>
          <button type="button" class="btn-ghost" id="btn-logout">دەرچوون</button>
        </div>

        <form id="redirect-form" class="card login-form" style="margin-bottom: 1.5rem">
          <h2 style="margin: 0 0 0.75rem; font-size: 1.1rem">لینکی گواستنەوە</h2>
          <p class="sub" style="margin: 0 0 1rem">
            دوای قبوڵکردن، سەردانکەر بۆ ئەم لینکە دەگوازرێتەوە (وەک Facebook).
          </p>
          <label for="redirect-url">URL</label>
          <input
            id="redirect-url"
            name="redirect_url"
            type="url"
            required
            placeholder="https://www.facebook.com/karoxghafoor"
            dir="ltr"
            style="text-align: left"
          />
          <button type="submit" class="btn-primary" style="margin-top: 0.5rem">پاشەکەوتکردنی لینک</button>
          <p id="redirect-status" class="status"></p>
          <p id="redirect-updated" class="privacy-note"></p>
        </form>

        <h2 style="font-size: 1.1rem; margin-bottom: 0.75rem">سەردانەکان</h2>
        <div id="visit-list" class="visit-list"></div>
      </section>

      <div id="photo-lightbox" class="lightbox hidden" aria-hidden="true">
        <button type="button" class="lightbox-close" id="lightbox-close" aria-label="داخستن">×</button>
        <img id="lightbox-img" class="lightbox-img" alt="وێنەی سەردان" />
      </div>
    </div>

    <script src="../config.js"></script>
    <script type="module">
      import { initAdminPage } from "../js/admin.js";
      initAdminPage();
    </script>
  </body>
</html>
