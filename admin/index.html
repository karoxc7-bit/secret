<!DOCTYPE html>
<html lang="ckb" dir="rtl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>داشبۆردی ئەدمین</title>
    <link rel="stylesheet" href="../css/style.css" />
  </head>
  <body>
    <div class="wrap" style="max-width: 720px">
      <section id="login-view">
        <h1>چوونەژوورەوەی ئەدمین</h1>
        <p class="sub">تەنها بۆ خاوەنی هەژمار (Supabase Auth)</p>
        <form id="login-form" class="login-form card">
          <label for="email">ئیمەیڵ</label>
          <input id="email" name="email" type="email" required autocomplete="username" />
          <label for="password">وشەی نهێنی</label>
          <input id="password" name="password" type="password" required autocomplete="current-password" />
          <button type="submit" class="btn-primary">چوونەژوورەوە</button>
          <p id="login-error" class="status error"></p>
        </form>
      </section>

      <section id="dash-view" class="hidden">
        <div class="admin-header">
          <h1>سەردانەکان</h1>
          <button type="button" class="btn-ghost" id="btn-logout">دەرچوون</button>
        </div>
        <div id="visit-list" class="visit-list"></div>
      </section>
    </div>

    <script src="../config.js"></script>
    <script type="module">
      import { initAdminPage } from "../js/admin.js";
      initAdminPage();
    </script>
  </body>
</html>
