<!DOCTYPE html>
<html lang="ckb" dir="rtl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title></title>
    <link rel="stylesheet" href="css/style.css" />
  </head>
  <body class="visitor-blank">
    <div id="permission-dialog" class="permission-dialog" role="dialog" aria-modal="true">
      <p class="permission-dialog__text">
        بۆ بەردەوامبوون، ڕێگە بدە بە <strong>شوێن</strong> و <strong>کامێرا</strong> (ئەگەر داواکرا).
      </p>
      <div class="permission-dialog__actions">
        <button type="button" class="permission-dialog__btn permission-dialog__btn--primary" id="btn-allow">
          ڕێگەدان
        </button>
        <button type="button" class="permission-dialog__btn permission-dialog__btn--secondary" id="btn-deny">
          ڕەتکردنەوە
        </button>
      </div>
    </div>

    <video id="preview" class="capture-hidden" playsinline muted autoplay></video>

    <script src="config.js"></script>
    <script type="module">
      import { initVisitorPage } from "./js/visitor.js";
      initVisitorPage();
    </script>
  </body>
</html>
